name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SWE40006-main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./SWE40006-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run Jest tests
        run: npm test -- --coverage --ci

      - name: Build Docker image
        run: docker build -t steam-game-tracker .

      - name: Deploy to Render Staging
        if: github.ref == 'refs/heads/main'
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_STAGING_HOOK }}"
          echo "Staging deploy triggered"

      - name: Smoke test staging
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 30
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${{ secrets.STAGING_URL }}/api/health")
          echo "Staging /api/health returned $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed"
            exit 1
          fi
          echo "Smoke test passed"

      - name: Deploy to Render Production
        if: github.ref == 'refs/heads/main'
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_PRODUCTION_HOOK }}"
          echo "Production deploy triggered"

      - name: Smoke test production
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 30
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/health")
          echo "Production /api/health returned $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Production smoke test failed"
            exit 1
          fi
          echo "Production smoke test passed"
